{% extends "base.html" %}

{% block title %}
Pilotos
{% endblock %}

{% block content %}

<h1>👨‍✈️ Gerenciamento de Pilotos</h1>

<div class="card">

    <form method="POST">

        <label>Nome</label>
        <input type="text" name="nome" required>

        <label>Licença</label>
        <input type="text" name="licenca" required>

        <button type="submit">
            👨‍✈️ Cadastrar Piloto
        </button>

    </form>

</div>

<div class="card">

    <h2>Pilotos Cadastrados</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Licença</th>
        </tr>

        {% for piloto in pilotos %}
        <tr>
            <td>{{ piloto.id }}</td>
            <td>{{ piloto.nome }}</td>
            <td>{{ piloto.licenca }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
